services:
  musicseerr:
    build:
      context: .
      args:
        - COMMIT_TAG=${COMMIT_TAG:-dev}
        - BUILD_DATE=${BUILD_DATE:-}
    container_name: musicseerr
    environment:
      - PORT=${PORT:-8688}
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "${PORT:-8688}:${PORT:-8688}"
    volumes:
      - ./config:/app/config
      - ./cache:/app/cache
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    networks:
      - gooseberry-internal

networks:
  gooseberry-internal:
    external: true